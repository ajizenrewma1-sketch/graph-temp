<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบวิเคราะห์และตรวจสอบยอดอนุมัติ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght=300;400;600;700&display=swap');
        body { font-family: 'Prompt', sans-serif; }
        .scrollable-list { max-height: 400px; overflow-y: auto; }
        .scrollable-list::-webkit-scrollbar { width: 6px; }
        .scrollable-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .tab-content { display: none; }
        .tab-active { display: block; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8">
            <h1 class="text-4xl font-bold text-slate-900 tracking-tight">Dashboard วิเคราะห์ข้อมูล</h1>
            <div class="flex gap-4 mt-6 border-b border-slate-200">
                <button id="btnInput" onclick="switchTab('inputTab', 'btnInput')" class="px-6 py-2 font-bold border-b-2 border-slate-900 text-slate-900">หน้ากรอกข้อมูล</button>
                <button id="btnReport" onclick="switchTab('reportTab', 'btnReport')" class="px-6 py-2 font-bold text-slate-500 hover:text-slate-900">รายงานและสรุปผล (Top 10)</button>
            </div>
        </header>

        <div id="inputTab" class="tab-content tab-active">
            <div class="mb-6 bg-slate-100 p-6 rounded-2xl border border-slate-200">
                <h3 class="text-lg font-bold mb-4 text-slate-800">อัปโหลดข้อมูลจาก Excel</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-white p-4 rounded-xl border border-slate-200">
                        <button onclick="downloadWrongTemplate()" class="w-full mb-2 bg-rose-600 hover:bg-rose-700 text-white py-2 rounded-lg font-bold text-sm">โหลด Template ยอดอนุมัติผิด</button>
                        <input type="file" id="inputWrongFile" accept=".xlsx" onchange="handleWrongFileUpload(event)" class="w-full text-sm">
                    </div>
                    <div class="bg-white p-4 rounded-xl border border-slate-200">
                        <button onclick="downloadCorrectTemplate()" class="w-full mb-2 bg-emerald-600 hover:bg-emerald-700 text-white py-2 rounded-lg font-bold text-sm">โหลด Template ยอดอนุมัติ/วันทำงาน</button>
                        <input type="file" id="inputCorrectFile" accept=".xlsx" onchange="handleCorrectFileUpload(event)" class="w-full text-sm">
                    </div>
                </div>
            </div>
            <div class="mb-6 bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-wrap gap-4 items-end">
                <div class="flex-1 min-w-[180px]">
                    <label class="block text-lg font-bold mb-3 text-slate-700">เลือกสัปดาห์ที่ต้องการ:</label>
                    <select id="weekSelect" class="w-full p-3 border-2 border-slate-200 rounded-xl font-bold outline-none focus:border-slate-900">
                        <option value="">-- เลือกสัปดาห์ --</option>
                        <option value="1">สัปดาห์ที่ 1</option>
                        <option value="2">สัปดาห์ที่ 2</option>
                        <option value="3">สัปดาห์ที่ 3</option>
                        <option value="4">สัปดาห์ที่ 4</option>
                    </select>
                </div>
                <button onclick="loadDataToInput()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-bold shadow-lg transition">โหลดข้อมูล</button>
                <button onclick="clearInputs()" class="bg-amber-500 hover:bg-amber-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg transition">ล้างข้อมูล</button>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <label class="block text-base font-bold text-rose-600 mb-3">ยอดอนุมัติผิด</label>
                    <textarea id="wrongInput" rows="6" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl" placeholder="สมชาย 1000"></textarea>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <label class="block text-base font-bold text-emerald-600 mb-3">ยอดอนุมัติและวันทำงาน</label>
                    <textarea id="correctInput" rows="6" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl" placeholder="สมหญิง 50000 20"></textarea>
                </div>
            </div>
            <button onclick="saveAndAnalyze()" class="w-full bg-slate-900 hover:bg-slate-800 text-white py-5 rounded-2xl font-bold text-xl shadow-xl">บันทึกและประมวลผล</button>
            
            <div id="results" class="mt-10 grid grid-cols-1 md:grid-cols-2 gap-6 hidden">
                <section class="bg-white p-7 rounded-3xl border shadow-sm"><h2 class="text-xl font-bold text-rose-700 mb-4">❌ ยอดที่อนุมัติผิด</h2><div id="wrongList" class="space-y-2 scrollable-list pr-2"></div></section>
                <section class="bg-white p-7 rounded-3xl border shadow-sm"><h2 class="text-xl font-bold text-emerald-700 mb-4">✅ จำนวนยอดที่อนุมติ</h2><div id="correctAmountList" class="space-y-2 scrollable-list pr-2"></div></section>
                <section class="bg-white p-7 rounded-3xl border shadow-sm"><h2 class="text-xl font-bold text-blue-700 mb-4">📅 จำนวนวันทำงาน</h2><div id="workDaysList" class="space-y-2 scrollable-list pr-2"></div></section>
                <section class="bg-white p-7 rounded-3xl border shadow-sm"><h2 class="text-xl font-bold text-indigo-700 mb-4">📈 ยอดเฉลี่ยต่อวัน</h2><div id="avgPerDayList" class="space-y-2 scrollable-list pr-2"></div></section>
            </div>
        </div>

        <div id="reportTab" class="tab-content">
            <div class="mb-6 bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-wrap gap-4 items-end">
                <div class="w-full md:w-64">
                    <label class="block text-lg font-bold mb-3">ดูรายงานของสัปดาห์:</label>
                    <select id="reportWeek" onchange="loadReport()" class="w-full p-3 border-2 border-slate-200 rounded-xl font-bold outline-none focus:border-slate-900">
                        <option value="">-- เลือกสัปดาห์ --</option>
                        <option value="1">สัปดาห์ที่ 1</option>
                        <option value="2">สัปดาห์ที่ 2</option>
                        <option value="3">สัปดาห์ที่ 3</option>
                        <option value="4">สัปดาห์ที่ 4</option>
                    </select>
                </div>
            </div>
            <div id="reportContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <section class="bg-white p-7 rounded-3xl border shadow-sm"><h2 class="text-xl font-bold text-rose-700 mb-4">🏆 Top 10 ยอดที่อนุมัติผิด</h2><div id="topWrong" class="space-y-2"></div></section>
                <section class="bg-white p-7 rounded-3xl border shadow-sm"><h2 class="text-xl font-bold text-emerald-700 mb-4">🏆 Top 10 จำนวนยอดที่อนุมติ</h2><div id="topCorrect" class="space-y-2"></div></section>
                <section class="bg-white p-7 rounded-3xl border shadow-sm"><h2 class="text-xl font-bold text-blue-700 mb-4">🏆 Top 10 จำนวนวันทำงาน</h2><div id="topDays" class="space-y-2"></div></section>
                <section class="bg-white p-7 rounded-3xl border shadow-sm"><h2 class="text-xl font-bold text-indigo-700 mb-4">🏆 Top 10 ยอดเฉลี่ยต่อวัน</h2><div id="topAvg" class="space-y-2"></div></section>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('approvalData') || '{}');

        function switchTab(tabId, btnActive) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('tab-active'));
            document.getElementById(tabId).classList.add('tab-active');
            
            ['btnInput', 'btnReport'].forEach(id => {
                const btn = document.getElementById(id);
                if (btn) {
                    if (id === btnActive) {
                        btn.classList.add('border-b-2', 'border-slate-900', 'text-slate-900');
                        btn.classList.remove('text-slate-500');
                    } else {
                        btn.classList.remove('border-b-2', 'border-slate-900', 'text-slate-900');
                        btn.classList.add('text-slate-500');
                    }
                }
            });
        }

        function parseNum(val) { return parseFloat(String(val).replace(/,/g, '').replace(/"/g, '')) || 0; }
        function cleanText(text) { return String(text).replace(/"/g, ''); }

        function clearInputs() {
            document.getElementById('wrongInput').value = '';
            document.getElementById('correctInput').value = '';
            const fileInputs = document.querySelectorAll('input[type="file"]');
            fileInputs.forEach(input => input.value = '');
            document.getElementById('results').classList.add('hidden');
        }

        function loadDataToInput() {
            const week = document.getElementById('weekSelect').value;
            if (!week) return alert('กรุณาเลือกสัปดาห์ที่ต้องการก่อนโหลดข้อมูล');
            
            const storageKey = `week_${week}`;
            if (db[storageKey] && (db[storageKey].wrong || db[storageKey].correct)) {
                document.getElementById('wrongInput').value = db[storageKey].wrong || '';
                document.getElementById('correctInput').value = db[storageKey].correct || '';
                processData(week, true);
                alert('โหลดข้อมูลเรียบร้อยแล้ว');
            } else {
                clearInputs();
                alert('ไม่พบข้อมูลสำหรับสัปดาห์นี้');
            }
        }

        function saveAndAnalyze() {
            const week = document.getElementById('weekSelect').value;
            const wrongText = document.getElementById('wrongInput').value.trim();
            const correctText = document.getElementById('correctInput').value.trim();
            
            if (!week) return alert('กรุณาเลือกสัปดาห์ที่ต้องการก่อนบันทึก');
            if (wrongText === "" && correctText === "") return alert('ไม่สามารถบันทึกข้อมูลว่างเปล่าได้');
            
            let totalErr = 0;
            wrongText.split('\n').forEach(line => {
                const parts = line.split(/\s+/);
                const val = parseFloat(parts[parts.length - 1]);
                if (!isNaN(val)) totalErr += val;
            });

            let totalApp = 0;
            correctText.split('\n').forEach(line => {
                const parts = line.split(/\s+/);
                const val = parseFloat(parts[1]);
                if (!isNaN(val)) totalApp += val;
            });

            const storageKey = `week_${week}`;
            if (!db[storageKey]) db[storageKey] = {};
            db[storageKey].wrong = wrongText;
            db[storageKey].correct = correctText;
            db[storageKey].totals = { totalApp, totalErr }; 

            localStorage.setItem('approvalData', JSON.stringify(db));
            processData(week, true);
            alert('บันทึกข้อมูลสำเร็จ!');
        }

        function processData(week, showResults) {
            const storageKey = `week_${week}`;
            const data = db[storageKey];
            if (!data) {
                if (showResults) document.getElementById('results').classList.add('hidden');
                return null;
            }

            let correctItems = (data.correct || '').split('\n').filter(l => l.trim()).map(l => {
                const p = l.trim().split(/\s+/);
                if (p.length < 3) return null;

                const rawDays = p[p.length - 1];
                const rawAmount = p[p.length - 2];

                if (rawDays === '#N/A' || rawAmount === '#N/A') return null;

                const d = parseNum(rawDays);
                const a = parseNum(rawAmount);

                if (d <= 0 || a <= 0) return null;

                return { name: cleanText(p.slice(0, -2).join(' ')), amount: a, days: d, avg: d > 0 ? a / d : 0 };
            }).filter(i => i !== null); 

            const validNames = correctItems.map(i => i.name);

            let wrongItems = (data.wrong || '').split('\n').filter(l => l.trim()).map(l => {
                const p = l.trim().split(/\s+/);
                return { name: cleanText(p.slice(0, -1).join(' ')), amount: parseNum(p[p.length - 1]) };
            }).sort((a, b) => b.amount - a.amount);

            if (showResults) {
                document.getElementById('results').classList.remove('hidden');
                renderSimpleList('wrongList', wrongItems, i => `${i.name} <b class="float-right">${i.amount.toLocaleString()}</b>`);
                renderSimpleList('correctAmountList', [...correctItems].sort((a, b) => b.amount - a.amount), i => `${i.name} <b class="float-right">${i.amount.toLocaleString()}</b>`);
                renderSimpleList('workDaysList', [...correctItems].sort((a, b) => b.days - a.days), i => `${i.name} <b class="float-right">${i.days} วัน</b>`);
                renderSimpleList('avgPerDayList', [...correctItems].sort((a, b) => b.avg - a.avg), i => `${i.name} <b class="float-right">${Math.round(i.avg).toLocaleString()}</b>`);
            }
            return { wrongItems, correctItems };
        }

        function renderSimpleList(targetId, dataList, formatFn, limit = null) {
            const container = document.getElementById(targetId);
            const listToRender = limit ? dataList.slice(0, limit) : dataList;
            container.innerHTML = listToRender.length > 0 ? listToRender.map((i, idx) => `<div class="p-3 bg-slate-50 border rounded-xl font-medium">${idx+1}. ${formatFn(i)}</div>`).join('') : '<div class="text-slate-400">ไม่พบข้อมูล</div>';
        }

        function renderTrendList(targetId, dataList, formatFn, limit = null, prevWeekData = null, key = 'name', isWrongTop = false) {
            const container = document.getElementById(targetId);
            const listToRender = limit ? dataList.slice(0, limit) : dataList;
            
            container.innerHTML = listToRender.length > 0 ? listToRender.map((i, idx) => {
                let trend = '';
                if (prevWeekData) {
                    const prevIdx = prevWeekData.findIndex(item => item[key] === i[key]);
                    if (prevIdx !== -1) {
                        const currentRank = idx + 1;
                        const prevRank = prevIdx + 1;
                        
                        if (isWrongTop) {
                            if (currentRank < prevRank) trend = `<span class="text-red-600 ml-2 font-bold">↑ ${prevRank}</span>`; 
                            else if (currentRank > prevRank) trend = `<span class="text-green-600 ml-2 font-bold">↓ ${prevRank}</span>`; 
                        } else {
                            if (currentRank < prevRank) trend = `<span class="text-green-600 ml-2 font-bold">↑ ${prevRank}</span>`;
                            else if (currentRank > prevRank) trend = `<span class="text-red-600 ml-2 font-bold">↓ ${prevRank}</span>`;
                        }
                    }
                }
                return `<div class="p-3 bg-slate-50 border rounded-xl font-medium">${idx+1}. ${formatFn(i)} ${trend}</div>`;
            }).join('') : '<div class="text-slate-400">ไม่พบข้อมูล</div>';
        }

        function loadReport() {
            const week = parseInt(document.getElementById('reportWeek').value);
            
            ['topWrong', 'topCorrect', 'topDays', 'topAvg'].forEach(id => document.getElementById(id).innerHTML = '');
            if (!week) return;

            let prevWeek = week - 1;

            const currentData = processData(week, false);
            const prevData = prevWeek >= 1 ? processData(prevWeek, false) : null;
            
            if (!currentData) return;
            const { wrongItems, correctItems } = currentData;
            
            const pWrong = prevData ? prevData.wrongItems : null;
            const pCorrect = prevData ? [...prevData.correctItems].sort((a,b) => b.amount - a.amount) : null;
            const pDays = prevData ? [...prevData.correctItems].sort((a,b) => b.days - a.days) : null;
            const pAvg = prevData ? [...prevData.correctItems].sort((a,b) => b.avg - a.avg) : null;

            renderTrendList('topWrong', wrongItems, i => `${i.name} <b class="float-right">${i.amount.toLocaleString()}</b>`, 10, pWrong, 'name', true);
            renderTrendList('topCorrect', [...correctItems].sort((a,b) => b.amount - a.amount), i => `${i.name} <b class="float-right">${i.amount.toLocaleString()}</b>`, 10, pCorrect);
            renderTrendList('topDays', [...correctItems].sort((a,b) => b.days - a.days), i => `${i.name} <b class="float-right">${i.days} วัน</b>`, 10, pDays);
            renderTrendList('topAvg', [...correctItems].sort((a,b) => b.avg - a.avg), i => `${i.name} <b class="float-right">${Math.round(i.avg).toLocaleString()}</b>`, 10, pAvg);
        }

        function readExcel(file) {
            return new Promise((resolve, reject) => {
                if (!file) return resolve([]);
                const reader = new FileReader();
                reader.onload = (e) => {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[sheetName];
                    const json = XLSX.utils.sheet_to_json(worksheet);
                    resolve(json);
                };
                reader.onerror = (error) => reject(error);
                reader.readAsArrayBuffer(file);
            });
        }

        function downloadWrongTemplate() {
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet([["ชื่อพนักงาน", "ยอดผิด"], ["สมชาย ใจดี", 1000], ["สมศักดิ์ ขยัน", 500]]);
            XLSX.utils.book_append_sheet(wb, ws, "Data");
            XLSX.writeFile(wb, "Template_ยอดอนุมัติผิด.xlsx");
        }

        function downloadCorrectTemplate() {
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet([["ชื่อพนักงาน", "ยอดอนุมัติ", "วันทำงาน"], ["สมหญิง รักดี", 50000, 20], ["สมศรี มีสุข", 45000, 22]]);
            XLSX.utils.book_append_sheet(wb, ws, "Data");
            XLSX.writeFile(wb, "Template_ยอดอนุมัติและวันทำงาน.xlsx");
        }

        async function handleWrongFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const data = await readExcel(file);
            const text = data.map(row => `${row['ชื่อพนักงาน']} ${row['ยอดผิด']}`).join('\n');
            document.getElementById('wrongInput').value = text;
        }

        async function handleCorrectFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const data = await readExcel(file);
            const text = data.map(row => `${row['ชื่อพนักงาน']} ${row['ยอดอนุมัติ']} ${row['วันทำงาน']}`).join('\n');
            document.getElementById('correctInput').value = text;
        }
    </script>
</body>
</html>
